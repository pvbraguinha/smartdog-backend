services:
  - type: web
    name: smartdog-backend
    env: docker
    plan: starter
    repo: https://github.com/pvbraguinha/smartdog-backend
    branch: main
    autoDeploy: true
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://smartdog-backend.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromService:
          name: smartdog-db
          type: pserv
          property: host
      - key: DB_PORT
        fromService:
          name: smartdog-db
          type: pserv
          property: port
      - key: DB_DATABASE
        value: martdog_db
      - key: DB_USERNAME
        value: martdog_db_user
      - key: DB_PASSWORD
        value: dLr842YglHqJ6bTvf9c0V8CTFg76I4rQ
      - key: APP_KEY
        generateValue: true

databases:
  - name: smartdog-db
    plan: free
    region: frankfurt