databases:
  - name: smartdog-db
    plan: free
    region: frankfurt

services:
  - type: web
    name: smartdog-backend
    env: docker
    plan: starter
    repo: https://github.com/pvbraguinha/smartdog-backend
    branch: main
    autoDeploy: true
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://smartdog-backend.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: smartdog-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: smartdog-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: smartdog-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: smartdog-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: smartdog-db
          property: password
      - key: APP_KEY
        generateValue: true
